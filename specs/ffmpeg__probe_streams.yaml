apiVersion: v1
tool:
  name: ffmpeg__probe_streams
  description: Inspect media streams and format metadata via ffprobe.
  docstring: |
    Returns stream and format metadata in JSON output using ffprobe.
  input:
    properties:
      input:
        type: string
        description: Input media file path.
    required: [input]
  output:
    type: object
    properties:
      status: { type: string }
      exit_code: { type: number }
      stdout: { type: string }
      stderr: { type: string }
      command: { type: string }
      execution_time_ms: { type: number }
execution:
  shell:
    mode: direct
  env:
    static:
      FFREPORT: "file=ffprobe.log:level=32"
  timeoutMs: 60000
  maxOutputBytes: 1048576
  command:
    executable: ffprobe
    args:
      - -v
      - error
      - -show_streams
      - -show_format
      - -of
      - json
      - "{{input}}"
